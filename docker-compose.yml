version: '3.8'

# UltraRAG Docker Compose Configuration
# Simple deployment with essential services

services:
  # Main UltraRAG Application
  ultrarag:
    build:
      context: .
      dockerfile: Dockerfile.production
      target: runtime
    image: ultrarag:latest
    container_name: ultrarag
    ports:
      - "5050:5050"
    environment:
      # Core environment
      - ULTRA_RAG_ENV=production
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - PORT=5050
      - HOST=0.0.0.0
      
      # API Keys (configure in .env file)
      - LLM_API_KEY=${LLM_API_KEY:-}
      - RETRIEVER_API_KEY=${RETRIEVER_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - EXA_API_KEY=${EXA_API_KEY:-}
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      
      # Optional service connections
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - POSTGRES_URL=${POSTGRES_URL:-postgresql://ultrarag:${POSTGRES_PASSWORD:-ultrarag123}@postgres:5432/ultrarag}
      - MILVUS_HOST=${MILVUS_HOST:-milvus}
      - MILVUS_PORT=${MILVUS_PORT:-19530}
      
      # Health check
      - WAIT_FOR_HOSTS=${WAIT_FOR_HOSTS:-}
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-false}
    env_file:
      - .env
    volumes:
      # Persistent storage
      - ./data:/app/data:rw
      - ./logs:/app/logs:rw
      # Configuration files
      - ./prompt:/app/prompt:ro
      - ./examples:/app/examples:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    networks:
      - ultrarag-network
    # Uncomment depends_on if using these services
    # depends_on:
    #   redis:
    #     condition: service_healthy
    #   postgres:
    #     condition: service_healthy

